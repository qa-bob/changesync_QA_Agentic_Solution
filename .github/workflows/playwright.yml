name: Playwright Tests

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite (smoke|navigation|forms|functional|visual|responsive|all)'
        required: false
        default: 'smoke'

env:
  SITE_URL: https://changesync.com
  CI: '1'

jobs:
  # ── Smoke gate ──────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          SITE_URL: ${{ env.SITE_URL }}

      - name: Upload smoke report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Functional suite (runs after smoke passes) ───────────────────────────────
  functional:
    name: Functional & Navigation & Forms
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run navigation tests
        run: npm run test:navigation

      - name: Run forms tests
        run: npm run test:forms

      - name: Run functional tests
        run: npm run test:functional

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: functional-report-${{ github.run_number }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── Responsive suite (runs after smoke passes) ───────────────────────────────
  responsive:
    name: Responsive Layout
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run responsive tests
        run: npm run test:responsive

      - name: Upload report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: responsive-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7

  # ── TypeScript check (runs on every push, no browser needed) ─────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck
